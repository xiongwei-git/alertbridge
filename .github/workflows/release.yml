name: Release container image

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ACR_IMAGE: ${{ vars.ACR_IMAGE }}
  ACR_USERNAME: ${{ vars.ACR_USERNAME }}

jobs:
  verify:
    name: Test release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify release version
        run: test "$(cat VERSION)" = "$GITHUB_REF_NAME"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Run static analysis
        run: go vet ./...

      - name: Check release configuration
        run: ./test/release/run.sh

      - name: Run Docker end-to-end tests
        run: ./test/e2e/run.sh

  publish:
    name: Publish multi-architecture image
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=AlertBridge
            org.opencontainers.image.description=Lightweight secure notification gateway
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest image provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  mirror-acr:
    name: Mirror image to ACR
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check ACR configuration
        id: acr
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          if [ -z "$ACR_IMAGE" ] || [ -z "$ACR_USERNAME" ] || [ -z "$ACR_PASSWORD" ]; then
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
            echo '::notice::ACR mirror skipped because ACR_IMAGE, ACR_USERNAME or ACR_PASSWORD is not configured.'
            exit 0
          fi

          registry=${ACR_IMAGE%%/*}
          repository=${ACR_IMAGE#*/}
          if [ "$registry" = "$ACR_IMAGE" ] || [ -z "$registry" ] || [ -z "$repository" ]; then
            echo 'Invalid ACR_IMAGE; expected registry/namespace/repository.' >&2
            exit 1
          fi

          echo 'enabled=true' >> "$GITHUB_OUTPUT"
          echo "registry=$registry" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.acr.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        if: steps.acr.outputs.enabled == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ACR
        if: steps.acr.outputs.enabled == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ steps.acr.outputs.registry }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Copy official image to ACR
        if: steps.acr.outputs.enabled == 'true'
        env:
          SOURCE_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          set -eu
          version=$GITHUB_REF_NAME
          version_number=${version#v}
          major=${version_number%%.*}
          remainder=${version_number#*.}
          minor=${remainder%%.*}

          set -- \
            --tag "$ACR_IMAGE:$version" \
            --tag "$ACR_IMAGE:v$major.$minor" \
            --tag "$ACR_IMAGE:latest"
          if [ "$major" -ne 0 ]; then
            set -- "$@" --tag "$ACR_IMAGE:v$major"
          fi

          docker buildx imagetools create \
            "$@" \
            "$REGISTRY/$IMAGE_NAME@$SOURCE_DIGEST"
          docker buildx imagetools inspect "$ACR_IMAGE:$version"
