name: alertbridge-e2e

services:
  mockfeishu:
    build:
      context: ./test/e2e/mock
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${E2E_MOCK_PORT:-19090}:9090"

  alertbridge:
    image: alertbridge:e2e
    build:
      context: .
      args:
        VERSION: e2e
    pull_policy: build
    environment:
      ALERTBRIDGE_ALLOW_INSECURE_HTTP: "1"
      ALERTBRIDGE_ALLOW_INSECURE_ADMIN_COOKIE: "1"
    depends_on:
      - mockfeishu
    healthcheck:
      interval: 2s
      timeout: 2s
      retries: 10
