{{define "content"}}
<section class="secret-card"><p class="eyebrow">DISPLAYED ONCE</p><h2>{{.SecretOwner}} 的新{{if eq .SecretKind "token"}}轻量令牌{{else}}密钥{{end}}</h2><p>请立即复制并安全保存。离开此页面后无法再次查看，只能重新轮换。</p><pre class="secret-value" tabindex="0">{{.Secret}}</pre><div class="notice error">如果这是轮换操作，旧值已经立即失效；请同步更新对应调用方。</div><div class="button-row">{{if eq .SecretKind "token"}}<a class="button primary" href="/admin/guide#simple-api">保存令牌后查看轻量接入指南</a>{{else}}<a class="button primary" href="/admin/guide?client={{urlquery .SecretOwner}}">保存密钥后查看接入指南</a>{{end}}<a class="button secondary" href="/admin/clients">返回客户端列表</a></div></section>
{{end}}
